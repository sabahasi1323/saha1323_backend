services:
  # Type of service
  type: web
  
  # Name of your service
  name: saha1323-backend
  
  # Environment variables
  env:
    # Node.js environment
    NODE_ENV: production
    
  # Build configuration
  buildCommand: "npm install && npm start"
  
  # Start command
  startCommand: "npm start"
  
  # Port your application listens on
  port: 5000
  
  # Health check path
  healthCheckPath: "/api/auth/verify"
  
  # Auto-deploy configuration
  autoDeploy: true
  
  # Branch to deploy
  branch: main
  
  # Root directory
  rootDir: .
